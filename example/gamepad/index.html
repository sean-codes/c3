<!doctype html>
<html>

<head>
   <title>C3 Example: Basic Cube</title>
   <meta charset="utf-8">
   <meta name="viewport"
      content="width=device-width, height=device-height, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0, shrink-to-fit=no">

   <style>
      html, body {
         margin: 0;
         padding: 0;
         color: #FFF;
         font-size: 14px;
      }

      * {
         font-family: monospace;
      }
      
      canvas {
         display: block;
         position: fixed;
      }
      
      .test {
         position: fixed;
         z-index: 100;
         padding: 2rem;
         top: 0;
         left: 0;
      }

      .test table td{
         min-width: 100px;
         text-align: center;
      }

      .test table td:first-of-type{
         text-align:right;
      }
   </style>
</head>

<body>
   <script type="module" src="./c3.js"></script>

   <div class="test">
      <h1>Anolog</h1>
      <table>
         <tr>
            <td></td>
            <td>x</td>
            <td>y</td>
            <td>rawX</td>
            <td>rawY</td>
         </tr>
         <tr id="anologx">
            <td>anolog left</td>
            <td class="x">0</td>
            <td class="y">0</td>
            <td class="rawX">0</td>
            <td class="rawY">0</td>
         </tr>
         <tr id="anology">
            <td>anolog right</td>
            <td class="x">0</td>
            <td class="y">0</td>
            <td class="rawX">0</td>
            <td class="rawY">0</td>
         </tr>
      </table>

      <h1>Buttons</h1>
      <table id="table-buttons">
         <tr>
            <td>Button Name</td>
            <td>Held</td>
            <td>Pressed Times</td>
         </tr>
         <tr id="x">
            <td>x</td>
            <td class="value">0</td>
            <td class="pressed">0</td>
         </tr>
         <tr id="square">
            <td>square</td>
            <td class="value">0</td>
            <td class="pressed">0</td>
         </tr>
         <tr id="triangle">
            <td>triangle</td>
            <td class="value">0</td>
            <td class="pressed">0</td>
         </tr>
         <tr id="circle">
            <td>circle</td>
            <td class="value">0</td>
            <td class="pressed">0</td>
         </tr>
         <tr id="down">
            <td>down</td>
            <td class="value">0</td>
            <td class="pressed">0</td>
         </tr>
         <tr id="left">
            <td>left</td>
            <td class="value">0</td>
            <td class="pressed">0</td>
         </tr>
         <tr id="up">
            <td>up</td>
            <td class="value">0</td>
            <td class="pressed">0</td>
         </tr>
         <tr id="right">
            <td>right</td>
            <td class="value">0</td>
            <td class="pressed">0</td>
         </tr>
         <tr id="r1">
            <td>r1</td>
            <td class="value">0</td>
            <td class="pressed">0</td>
         </tr>
         <tr id="l1">
            <td>l1</td>
            <td class="value">0</td>
            <td class="pressed">0</td>
         </tr>
         <tr id="r2">
            <td>r2</td>
            <td class="value">0</td>
            <td class="pressed">0</td>
         </tr>
         <tr id="l2">
            <td>l2</td>
            <td class="value">0</td>
            <td class="pressed">0</td>
         </tr>
         <tr id="anolog_right_click">
            <td>anolog r click</td>
            <td class="value">0</td>
            <td class="pressed">0</td>
         </tr>
         <tr id="anolog_left_click">
            <td>anolog l click</td>
            <td class="value">0</td>
            <td class="pressed">0</td>
         </tr>
         <tr id="start">
            <td>start</td>
            <td class="value">0</td>
            <td class="pressed">0</td>
         </tr>
         <tr id="options">
            <td>options</td>
            <td class="value">0</td>
            <td class="pressed">0</td>
         </tr>
      </table>
   </div>
</body>

</html>
